<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <input type="text" id="name">
        <label for="rating">Rating:</label>
        <select id="rating">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <p id="demo"></p>
        <textarea id="comments" rows="4" cols="30" placeholder="Write comments..."></textarea>
        <p id="count">Characters: 0</p>
        <button id="submitBtn">Submit</button>
        <script>
            let name = document.getElementById("name");
            let rating = document.getElementById("rating");
            name.addEventListener("blur",function(){
                if(name.value.trim().length <= 3){
                    alert("Name must be more than 3 characters");
                }
            });
            rating.addEventListener("change",function(){
                if(rating.value ===5){
                    document.getElementById("demo").innerHTML = "Thank you for the 5-star rating!";
                } ;
                if(rating.value ===4){
                    document.getElementById("demo").innerHTML = "Thank you for the 4-star rating!";
                } ;
                if(rating.value ===3){
                    document.getElementById("demo").innerHTML = "Thank you for the 3-star rating!";
                } ;
                if(rating.value ===2){
                    document.getElementById("demo").innerHTML = "Thank you for the 2-star rating!";
                } ;
                if(rating.value ===1){
                    document.getElementById("demo").innerHTML = "Thank you for the 1-star rating!";
                } ;
            });
            let submitBtn = document.getElementById("submitBtn");
            submitBtn.addEventListener("click", function(){
                alert("FeedBack Submitted");
            });
            comments.addEventListener("input", function () {
    document.getElementById("count").innerText =
        "Characters: " + comments.value.length;
});


        </script>
    </body>
</html>
