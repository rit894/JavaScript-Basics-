<!DOCTYPE html>
<html >
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="box"
            style="width:200px;height:100px;padding:16px;border:1px solid #000;">
            Move mouse over this box!
            </div>

        <p id="demo"></p>
        <button id="mybtn">Try it</button>
        <script>

            const btn = document.getElementById("mybtn");
            btn.addEventListener("cick",function(){
                document.getElementById("demo").innerHTML = Date();
            });
            const box = document.getElementById("box");
            box.addEventListener("mouseover",function(){
                box.style.backgroundColor="yellow";
                box.innerHTML = "Mouse in the box!";
            });
            box.addEventListener("dblclick",function(){
                box.style.backgroundColor="whitesmoke";
                box.innerHTML = "Mouse just now has jumped";
            });
            box.addEventListener("mouseout",function(){
                box.style.backgroundColor="cyan";
                box.innerHTML = "Mouse out of the box!";
            });
            
        </script>

    </body>
</html>
