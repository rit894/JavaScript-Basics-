<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>

<p>A function will not run before you call it.</p>

<p id="demo"></p>
<p id="demo1"></p>
<p id="demo2"></p>
<button type="button" onclick="document.getElementById('demo').innerHTML = sayHello()">Try it</button>

<script>
function sayHello() {
  return "Hello World";
}
function fullName(...args) {
  return args[0] + " " + args[1];
}

let name = fullName("John", "Doe");

document.getElementById("demo1").innerHTML = "The name is  " + name;

const Sqr = (x) => x*x;
document.getElementById("demo2").innerHTML = "The square of 5 is " + Sqr(5);
</script>

</body>
</html>
