<!DOCTYPE html>
<html>
    <head>
        <script>
            function myfunction(){
                document.getElementById("demo").innerHTML = 'Hello boy the paragraph is changed';

            }
        </script>

    </head>
    <body>
        <h2> JavaScript In the body </h2>
        <p id="demo"> This isthe original para dude </p>
        <button type="button" onclick="myfunction()">Click Me</button>
        <script>
            alert("This is an alert box");
            console.log(5+6);
        </script>
        <button onclick="window.print()">Print this page</button>

        
        
    </body>
</html>
